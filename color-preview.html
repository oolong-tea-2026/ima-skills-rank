<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rank Color Preview</title>
<style>
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; padding: 2rem; }
.row { display: flex; align-items: center; gap: 1rem; margin: 0.5rem 0; }
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 3rem; padding: 0.3rem 0.6rem; border-radius: 6px;
  font-weight: 700; font-size: 0.9rem; color: #fff;
}
.label { color: #8b949e; font-size: 0.85rem; min-width: 120px; }
</style>
</head>
<body>
<h2 style="margin-bottom:1rem">Rank Badge Color Preview</h2>

<div class="row"><span class="label">Top 5 (1-5)</span><span class="badge" style="background:#1a7f37">#1</span><span class="badge" style="background:#1a7f37">#3</span><span class="badge" style="background:#1a7f37">#5</span></div>

<div class="row"><span class="label">Top 10 (6-10)</span><span class="badge" style="background:#3d6e56">#6</span><span class="badge" style="background:#3d6e56">#8</span><span class="badge" style="background:#3d6e56">#10</span></div>

<div class="row"><span class="label">Top 25 (11-25)</span><span class="badge" style="background:#7c6c1a">#11</span><span class="badge" style="background:#7c6c1a">#18</span><span class="badge" style="background:#7c6c1a">#25</span></div>

<div class="row"><span class="label">Top 50 (26-50)</span><span class="badge" style="background:#c4500a">#26</span><span class="badge" style="background:#c4500a">#35</span><span class="badge" style="background:#c4500a">#50</span></div>

<div class="row"><span class="label">Unranked (50+)</span><span class="badge" style="background:#b91c1c">50+</span></div>

</body>
</html>
