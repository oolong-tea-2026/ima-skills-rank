<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="https://www.imaclaw.ai/favicon.ico" type="image/x-icon">
<title>IMA Skills ClawHub Ranks</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --orange: #db6d28;
  --red: #f85149;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

header { text-align: center; margin-bottom: 1.5rem; }
header h1 { font-size: 1.5rem; font-weight: 600; }
header h1 span { color: var(--accent); }
header .meta { color: var(--text-muted); font-size: 0.82rem; margin-top: 0.4rem; }

/* Tab switcher */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-bottom: 1.25rem;
}

.tab-btn {
  padding: 0.45rem 1.4rem;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  transition: all 0.15s;
}

.tab-btn:first-child { border-radius: 8px 0 0 8px; }
.tab-btn:last-child { border-radius: 0 8px 8px 0; border-left: none; }

.tab-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.tab-btn:not(.active):hover {
  background: rgba(88,166,255,0.08);
  color: var(--text);
}

/* Skill cards */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
}

.skill-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.skill-header {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.skill-header .name { font-weight: 600; font-size: 0.95rem; }
.skill-header .slug { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

.skill-stats {
  display: flex;
  gap: 0.5rem;
  font-size: 0.72rem;
}

.skill-stats .stat {
  padding: 0.15rem 0.45rem;
  border-radius: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.keyword-list { padding: 0; }

.keyword-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  transition: background 0.1s;
}

.keyword-row:last-child { border-bottom: none; }
.keyword-row:hover { background: rgba(88,166,255,0.04); }

.keyword-text {
  font-size: 0.85rem;
  color: var(--text);
  text-decoration: none;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.keyword-text:hover { color: var(--accent); }

.skill-header a:hover .name { color: var(--accent); }
.skill-header a:hover .slug { color: var(--accent); }

.keyword-rank {
  flex-shrink: 0;
  margin-left: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  font-weight: 700;
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
  color: #fff;
}

.rank-top5 { background: #1a7f37; }
.rank-top10 { background: #3d6e56; }
.rank-top25 { background: #7c6c1a; }
.rank-top50 { background: #c4500a; }
.rank-none { background: #b91c1c; font-weight: 600; font-size: 0.78rem; }

.score-text {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 3rem;
  text-align: right;
}

/* By Words table */
.words-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow-x: auto;
}

.words-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

.words-table th {
  text-align: left;
  padding: 0.65rem 1rem;
  border-bottom: 2px solid var(--border);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.words-table td {
  padding: 0.55rem 1rem;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  vertical-align: middle;
}

.words-table tr:last-child td { border-bottom: none; }
.words-table tr:hover td { background: rgba(88,166,255,0.04); }

.words-table .kw-cell {
  font-weight: 500;
  white-space: nowrap;
}

.words-table .kw-cell a {
  color: var(--text);
  text-decoration: none;
}

.words-table .kw-cell a:hover { color: var(--accent); }

.words-table .ranks-cell {
  font-variant-numeric: tabular-nums;
}

.rank-link {
  text-decoration: none;
  color: #fff;
  padding: 0.15rem 0.45rem;
  border-radius: 5px;
  font-weight: 700;
  font-size: 0.8rem;
  display: inline-block;
  margin: 0.1rem 0.15rem;
  transition: opacity 0.15s;
}

.rank-link:hover { opacity: 0.8; }

.rank-unranked {
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 600;
}

/* Legend */
.legend {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 1.25rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}

.legend-item { display: flex; align-items: center; gap: 0.25rem; }
.legend-dot { width: 8px; height: 8px; border-radius: 3px; }

/* Date nav */
.date-nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  font-size: 0.85rem;
  gap: 0.5rem;
  max-width: 420px;
  margin: 0 auto;
}

.date-nav .nav-prev { text-align: right; }
.date-nav .nav-next { text-align: left; }

.date-nav .current {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  font-size: 0.95rem;
  text-align: center;
  padding: 0.15rem 0.6rem;
  background: rgba(88,166,255,0.1);
  border-radius: 6px;
}

.date-nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.82rem;
  cursor: pointer;
  font-variant-numeric: tabular-nums;
  transition: color 0.15s;
}

.date-nav a:hover { color: var(--accent); }

.date-nav .placeholder {
  visibility: hidden;
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
}

/* Loading / error */
.loading { text-align: center; padding: 3rem; color: var(--text-muted); }

.spinner {
  display: inline-block;
  width: 22px; height: 22px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 0.5rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg { text-align: center; padding: 3rem; color: var(--red); }

footer {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.72rem;
}

footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 640px) {
  .skills-grid { grid-template-columns: 1fr; }
  .container { padding: 1rem; }
  .words-table { font-size: 0.78rem; }
  .words-table th, .words-table td { padding: 0.45rem 0.6rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐾 <span>IMA Skills</span> ClawHub Ranks</h1>
    <div class="meta" id="meta">Loading...</div>
  </header>

  <div class="tab-bar">
    <div class="tab-btn active" id="tab-skills" onclick="switchTab('skills')">By Skills</div>
    <div class="tab-btn" id="tab-words" onclick="switchTab('words')">By Words</div>
  </div>

  <div id="content"><div class="loading"><div class="spinner"></div><br>Fetching ranking data...</div></div>

  <footer>
    Data from <a href="https://clawhub.com" target="_blank">ClawHub</a> search API
    · <a href="https://api.wulong.dev/ima-rank/v1" target="_blank">API</a>
    · <a href="https://github.com/oolong-tea-2026/ima-skills-rank" target="_blank">Source</a>
  </footer>
</div>

<script>
const API = "https://api.wulong.dev/ima-rank/v1";

let indexData = null;
let currentConfig = null;
let currentSnapshot = null;
let currentDate = null;
let activeTab = "skills";

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-skills").classList.toggle("active", tab === "skills");
  document.getElementById("tab-words").classList.toggle("active", tab === "words");
  if (currentConfig && currentSnapshot) {
    if (tab === "skills") renderSkills(currentConfig, currentSnapshot);
    else renderWords(currentConfig, currentSnapshot);
  }
}

async function load(date) {
  try {
    const fetches = [fetch(`${API}/config`)];
    if (!indexData) fetches.push(fetch(`${API}/index`));

    const responses = await Promise.all(fetches);
    currentConfig = await responses[0].json();
    if (responses[1]) indexData = await responses[1].json();

    const targetDate = date || indexData.latest || (indexData.dates && indexData.dates[indexData.dates.length - 1]);

    const snapshotResp = await fetch(`${API}/snapshot?date=${targetDate}`);
    if (!snapshotResp.ok) throw new Error(`Snapshot not found for ${targetDate}`);
    currentSnapshot = await snapshotResp.json();
    currentDate = targetDate;

    renderNav(targetDate);
    if (activeTab === "skills") renderSkills(currentConfig, currentSnapshot);
    else renderWords(currentConfig, currentSnapshot);
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="error-msg">Failed to load: ${esc(e.message)}</div>`;
  }
}

function navigateTo(date) {
  document.getElementById("content").innerHTML =
    '<div class="loading"><div class="spinner"></div><br>Loading...</div>';
  load(date);
}

function renderNav(currentDate) {
  const dates = indexData.dates;
  const idx = dates.indexOf(currentDate);
  const prevDate = idx > 0 ? dates[idx - 1] : null;
  const nextDate = idx < dates.length - 1 ? dates[idx + 1] : null;

  // Placeholder uses a sample date to hold the column width even when empty
  const placeholderDate = "0000-00-00";

  let navHtml = '<div class="date-nav">';
  // Prev slot (always present, hidden placeholder if no prev)
  navHtml += '<div class="nav-prev">';
  navHtml += prevDate
    ? `<a onclick="navigateTo('${prevDate}')">← ${prevDate}</a>`
    : `<span class="placeholder">← ${placeholderDate}</span>`;
  navHtml += '</div>';
  // Current slot
  navHtml += `<span class="current">${currentDate}</span>`;
  // Next slot (always present, hidden placeholder if no next)
  navHtml += '<div class="nav-next">';
  navHtml += nextDate
    ? `<a onclick="navigateTo('${nextDate}')">${nextDate} →</a>`
    : `<span class="placeholder">${placeholderDate} →</span>`;
  navHtml += '</div>';
  navHtml += '</div>';
  document.getElementById("meta").innerHTML = navHtml;
}

function rankClass(rank) {
  if (rank === null) return "rank-none";
  if (rank <= 5) return "rank-top5";
  if (rank <= 10) return "rank-top10";
  if (rank <= 25) return "rank-top25";
  return "rank-top50";
}

function rankBg(rank) {
  if (rank <= 5) return "#1a7f37";
  if (rank <= 10) return "#3d6e56";
  if (rank <= 25) return "#7c6c1a";
  return "#c4500a";
}

function renderSkills(config, snapshot) {
  const lookup = {};
  for (const r of snapshot.results) {
    lookup[`${r.skill}|${r.keyword}`] = r;
  }

  let html = '<div class="skills-grid">';

  for (const skill of config.skills) {
    const skillResults = skill.keywords.map(kw => lookup[`${skill.slug}|${kw}`]).filter(Boolean);
    if (skillResults.length === 0) continue; // skip skills not present in this snapshot
    const ranked = skillResults.filter(r => r.rank !== null);
    const bestRank = ranked.length ? Math.min(...ranked.map(r => r.rank)) : null;

    html += `<div class="skill-card">`;
    html += `<div class="skill-header">`;
    html += `<div><a href="https://clawhub.ai/skills/${encodeURIComponent(skill.slug)}" target="_blank" style="text-decoration:none;color:inherit"><div class="name">${esc(skill.displayName)}</div><div class="slug">${esc(skill.slug)}</div></a></div>`;
    html += `<div class="skill-stats">`;
    html += `<span class="stat" style="background:rgba(88,166,255,0.1);color:var(--accent)">${ranked.length}/${skillResults.length}</span>`;
    if (bestRank !== null) {
      const cls = bestRank <= 5 ? "--green" : bestRank <= 10 ? "--green" : bestRank <= 25 ? "--yellow" : "--orange";
      html += `<span class="stat" style="background:rgba(88,166,255,0.1);color:var(${cls})">best #${bestRank}</span>`;
    }
    html += `</div></div>`;

    html += `<div class="keyword-list">`;
    const sorted = [...skillResults].sort((a, b) => {
      if (a.rank === null && b.rank === null) return 0;
      if (a.rank === null) return 1;
      if (b.rank === null) return -1;
      return a.rank - b.rank;
    });

    for (const r of sorted) {
      const cls = rankClass(r.rank);
      const rankText = r.rank === null ? `${snapshot.searchLimit}+` : `#${r.rank}`;
      const scoreText = r.score != null ? r.score.toFixed(2) : "";

      html += `<div class="keyword-row">`;
      html += `<a href="https://clawhub.ai/skills?q=${encodeURIComponent(r.keyword)}" target="_blank" class="keyword-text">${esc(r.keyword)}</a>`;
      html += `<div class="keyword-rank">`;
      if (scoreText) html += `<span class="score-text">${scoreText}</span>`;
      html += `<span class="rank-badge ${cls}">${rankText}</span>`;
      html += `</div></div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

function renderWords(config, snapshot) {
  // Build lookup: keyword → [{skill, slug, rank, score}, ...]
  const byWord = {};
  for (const r of snapshot.results) {
    if (!byWord[r.keyword]) byWord[r.keyword] = [];
    byWord[r.keyword].push(r);
  }

  // Collect all unique keywords that exist in this snapshot
  const seenKw = new Set();
  const allKeywords = [];
  for (const skill of config.skills) {
    for (const kw of skill.keywords) {
      if (!seenKw.has(kw) && byWord[kw]) {
        seenKw.add(kw);
        allKeywords.push(kw);
      }
    }
  }

  // Sort: keywords with best ranks first
  allKeywords.sort((a, b) => {
    const aEntries = (byWord[a] || []).filter(r => r.rank !== null);
    const bEntries = (byWord[b] || []).filter(r => r.rank !== null);
    const aBest = aEntries.length ? Math.min(...aEntries.map(r => r.rank)) : 9999;
    const bBest = bEntries.length ? Math.min(...bEntries.map(r => r.rank)) : 9999;
    return aBest - bBest;
  });

  // Build slug→displayName map
  const slugToName = {};
  for (const skill of config.skills) {
    slugToName[skill.slug] = skill.displayName;
  }

  let html = '<div class="words-table-wrap"><table class="words-table">';
  html += '<thead><tr><th>Keyword</th><th>Our Rankings</th></tr></thead>';
  html += '<tbody>';

  for (const kw of allKeywords) {
    const entries = (byWord[kw] || []).filter(r => r.rank !== null);
    // Sort by rank ascending
    entries.sort((a, b) => a.rank - b.rank);

    html += '<tr>';
    html += `<td class="kw-cell"><a href="https://clawhub.ai/skills?q=${encodeURIComponent(kw)}" target="_blank">${esc(kw)}</a></td>`;
    html += '<td class="ranks-cell">';

    if (entries.length === 0) {
      html += `<span class="rank-unranked">${snapshot.searchLimit}+</span>`;
    } else {
      const parts = entries.map(r => {
        const bg = rankBg(r.rank);
        const title = slugToName[r.skill] || r.skill;
        return `<a href="https://clawhub.ai/skills/${encodeURIComponent(r.skill)}" target="_blank" class="rank-link" style="background:${bg}" title="${esc(title)}">#${r.rank}</a>`;
      });
      html += parts.join(' ');
    }

    html += '</td></tr>';
  }

  html += '</tbody></table></div>';
  document.getElementById("content").innerHTML = html;
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

load();
</script>
</body>
</html>
