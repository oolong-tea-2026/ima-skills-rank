<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMA Skills Rank Tracker</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --orange: #db6d28;
  --red: #f85149;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

header { text-align: center; margin-bottom: 1.5rem; }
header h1 { font-size: 1.5rem; font-weight: 600; }
header h1 span { color: var(--accent); }
header .meta { color: var(--text-muted); font-size: 0.82rem; margin-top: 0.4rem; }

/* Summary bar */
.summary {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.summary-pill {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.7rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.78rem;
}

.summary-pill .num { font-weight: 700; font-variant-numeric: tabular-nums; }

/* Skill cards */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
}

.skill-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.skill-header {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.skill-header .name { font-weight: 600; font-size: 0.95rem; }
.skill-header .slug { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

.skill-stats {
  display: flex;
  gap: 0.5rem;
  font-size: 0.72rem;
}

.skill-stats .stat {
  padding: 0.15rem 0.45rem;
  border-radius: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.keyword-list { padding: 0; }

.keyword-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  transition: background 0.1s;
}

.keyword-row:last-child { border-bottom: none; }
.keyword-row:hover { background: rgba(88,166,255,0.04); }

.keyword-text {
  font-size: 0.85rem;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.keyword-rank {
  flex-shrink: 0;
  margin-left: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  font-weight: 600;
  font-size: 0.82rem;
  font-variant-numeric: tabular-nums;
}

.rank-top5 { background: rgba(63,185,80,0.15); color: var(--green); }
.rank-top10 { background: rgba(88,166,255,0.15); color: var(--accent); }
.rank-top20 { background: rgba(210,153,34,0.15); color: var(--yellow); }
.rank-top50 { background: rgba(219,109,40,0.15); color: var(--orange); }
.rank-none { background: rgba(139,148,158,0.08); color: var(--text-muted); font-weight: 400; font-size: 0.78rem; }

.score-text {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 3rem;
  text-align: right;
}

/* Legend */
.legend {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 1.25rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}

.legend-item { display: flex; align-items: center; gap: 0.25rem; }
.legend-dot { width: 8px; height: 8px; border-radius: 3px; }

/* Loading / error */
.loading { text-align: center; padding: 3rem; color: var(--text-muted); }

.spinner {
  display: inline-block;
  width: 22px; height: 22px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 0.5rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg { text-align: center; padding: 3rem; color: var(--red); }

.refresh-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.25rem 0.6rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.refresh-btn:hover { border-color: var(--accent); color: var(--text); }

footer {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.72rem;
}

footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 640px) {
  .skills-grid { grid-template-columns: 1fr; }
  .container { padding: 1rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐾 <span>IMA Skills</span> Rank Tracker</h1>
    <div class="meta" id="meta">Loading...</div>
  </header>

  <div id="summary" class="summary" style="display:none"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><br>Fetching ranking data...</div></div>

  <div class="legend" id="legend" style="display:none">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(63,185,80,0.3)"></div> Top 5</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(88,166,255,0.3)"></div> Top 10</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(210,153,34,0.3)"></div> Top 20</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(219,109,40,0.3)"></div> Top 50</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(139,148,158,0.15)"></div> 50+</div>
  </div>

  <footer>
    Data from <a href="https://clawhub.com" target="_blank">ClawHub</a> search API
    · <a href="https://api.wulong.dev/ima-rank/v1" target="_blank">API</a>
    · <a href="https://github.com/oolong-tea-2026/ima-skills-rank" target="_blank">Source</a>
  </footer>
</div>

<script>
const API = "https://api.wulong.dev/ima-rank/v1";

async function load() {
  try {
    const [configResp, snapshotResp] = await Promise.all([
      fetch(`${API}/config`),
      fetch(`${API}/snapshot?date=latest`),
    ]);

    if (!configResp.ok || !snapshotResp.ok) {
      throw new Error(`API error: config=${configResp.status}, snapshot=${snapshotResp.status}`);
    }

    const config = await configResp.json();
    const snapshot = await snapshotResp.json();
    render(config, snapshot);
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="error-msg">Failed to load: ${esc(e.message)}</div>`;
  }
}

function render(config, snapshot) {
  // Build lookup: skill+keyword → result
  const lookup = {};
  for (const r of snapshot.results) {
    lookup[`${r.skill}|${r.keyword}`] = r;
  }

  // Meta
  const ts = new Date(snapshot.timestamp);
  document.getElementById("meta").innerHTML =
    `${ts.toLocaleDateString()} ${ts.toLocaleTimeString()} · ` +
    `${snapshot.totalCombos} keywords tracked ` +
    `<button class="refresh-btn" onclick="location.reload()">↻</button>`;

  // Summary
  const s = snapshot.summary;
  const summaryEl = document.getElementById("summary");
  summaryEl.style.display = "";
  summaryEl.innerHTML = `
    <div class="summary-pill"><span class="num" style="color:var(--green)">${s.top5}</span> top 5</div>
    <div class="summary-pill"><span class="num" style="color:var(--accent)">${s.top10}</span> top 10</div>
    <div class="summary-pill"><span class="num" style="color:var(--yellow)">${s.top20}</span> top 20</div>
    <div class="summary-pill"><span class="num" style="color:var(--orange)">${s.ranked}</span> ranked</div>
    <div class="summary-pill"><span class="num" style="color:var(--text-muted)">${s.unranked}</span> unranked</div>
  `;

  // Skill cards
  let html = '<div class="skills-grid">';

  for (const skill of config.skills) {
    // Compute per-skill stats
    const skillResults = skill.keywords.map(kw => lookup[`${skill.slug}|${kw}`]).filter(Boolean);
    const ranked = skillResults.filter(r => r.rank !== null);
    const bestRank = ranked.length ? Math.min(...ranked.map(r => r.rank)) : null;

    html += `<div class="skill-card">`;
    html += `<div class="skill-header">`;
    html += `<div><div class="name">${esc(skill.displayName)}</div><div class="slug">${esc(skill.slug)}</div></div>`;
    html += `<div class="skill-stats">`;
    html += `<span class="stat" style="background:rgba(88,166,255,0.1);color:var(--accent)">${ranked.length}/${skillResults.length}</span>`;
    if (bestRank !== null) {
      const cls = bestRank <= 5 ? "--green" : bestRank <= 10 ? "--accent" : bestRank <= 20 ? "--yellow" : "--orange";
      html += `<span class="stat" style="background:rgba(88,166,255,0.1);color:var(${cls})">best #${bestRank}</span>`;
    }
    html += `</div></div>`;

    html += `<div class="keyword-list">`;
    // Sort: ranked first (by rank asc), then unranked
    const sorted = [...skillResults].sort((a, b) => {
      if (a.rank === null && b.rank === null) return 0;
      if (a.rank === null) return 1;
      if (b.rank === null) return -1;
      return a.rank - b.rank;
    });

    for (const r of sorted) {
      const cls = r.rank === null ? "rank-none"
        : r.rank <= 5 ? "rank-top5"
        : r.rank <= 10 ? "rank-top10"
        : r.rank <= 20 ? "rank-top20" : "rank-top50";

      const rankText = r.rank === null ? `${snapshot.searchLimit}+` : `#${r.rank}`;
      const scoreText = r.score != null ? r.score.toFixed(2) : "";

      html += `<div class="keyword-row">`;
      html += `<span class="keyword-text">${esc(r.keyword)}</span>`;
      html += `<div class="keyword-rank">`;
      if (scoreText) html += `<span class="score-text">${scoreText}</span>`;
      html += `<span class="rank-badge ${cls}">${rankText}</span>`;
      html += `</div></div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  document.getElementById("content").innerHTML = html;
  document.getElementById("legend").style.display = "";
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

load();
</script>
</body>
</html>
